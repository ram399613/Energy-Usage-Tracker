<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Tracker - Login/Signup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card" id="loginCard">
      <h2>Welcome Back</h2>
      <div id="loginAlert" class="alert"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
      <div class="auth-links">
        Don't have an account? <a href="#" id="showSignup">Sign up here</a>
      </div>
    </div>

    <div class="auth-card" id="signupCard" style="display: none;">
      <h2>Create Account</h2>
      <div id="signupAlert" class="alert"></div>
      <form id="signupForm">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" required>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" required>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" required>
        </div>
        <button type="submit" class="btn">Sign Up</button>
      </form>
      <div class="auth-links">
        Already have an account? <a href="#" id="showLogin">Login here</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
