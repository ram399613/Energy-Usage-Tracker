<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen AI | Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body class="analytics-page">
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-bolt"></i><span>NexGen <span>AI</span></span></div>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="analytics.html" class="active"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="devices.html"><i class="fas fa-laptop-house"></i> Devices</a>
                <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="h-left"><h1>Deep <span>Analytics</span></h1><p>Neural prediction & historical trends</p></div>
                <div class="h-right">
                    <button class="mode-toggle glass" id="theme-toggle"><i class="fas fa-moon"></i></button>
                    <button class="btn-primary glass"><i class="fas fa-download"></i> Export Report</button>
                </div>
            </header>

            <div class="scroll-area">
                <div class="chart-full glass">
                    <div class="cc-header"><h3>Monthly Usage Prediction</h3><p>AI-driven forecast for the next 30 days</p></div>
                    <div id="prediction-chart"></div>
                </div>

                <div class="layout-2col">
                    <div class="chart-card glass">
                        <h3>Consumption Heatmap</h3>
                        <div id="heatmap-chart"></div>
                    </div>
                    <div class="chart-card glass">
                        <h3>Efficiency Trends</h3>
                        <div id="trends-chart"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
