<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen AI | Devices</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="devices-page">
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-bolt"></i><span>NexGen <span>AI</span></span></div>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="devices.html" class="active"><i class="fas fa-laptop-house"></i> Devices</a>
                <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer"><a href="index.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="h-left"><h1>Smart <span>Devices</span></h1><p>Monitor & control connected IoT hardware</p></div>
                <div class="h-right">
                    <button class="mode-toggle glass" id="theme-toggle"><i class="fas fa-moon"></i></button>
                    <button class="btn-primary glass"><i class="fas fa-plus"></i> Add Device</button>
                </div>
            </header>

            <div class="scroll-area">
                <div class="device-grid">
                    <!-- Device Cards -->
                    <div class="glass device-card active">
                        <div class="dc-top">
                            <i class="fas fa-snowflake"></i>
                            <div class="dc-status"><span>Active</span><div class="dot"></div></div>
                        </div>
                        <h3>Living Room AC</h3>
                        <div class="dc-info"><span>Usage: 1.2 kW</span><span>Efficiency: 92%</span></div>
                        <button class="toggle-btn">Turn Off</button>
                    </div>
                    <div class="glass device-card active">
                        <div class="dc-top">
                            <i class="fas fa-lightbulb"></i>
                            <div class="dc-status"><span>Active</span><div class="dot"></div></div>
                        </div>
                        <h3>Smart Lighting</h3>
                        <div class="dc-info"><span>Usage: 0.2 kW</span><span>Efficiency: 98%</span></div>
                        <button class="toggle-btn">Turn Off</button>
                    </div>
                    <div class="glass device-card idle">
                        <div class="dc-top">
                            <i class="fas fa-tv"></i>
                            <div class="dc-status"><span>Idle</span><div class="dot gray"></div></div>
                        </div>
                        <h3>Home Theater</h3>
                        <div class="dc-info"><span>Usage: 0.05 kW</span><span>Efficiency: --</span></div>
                        <button class="toggle-btn">Turn On</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <style>
        .device-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .device-card { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .dc-top { display: flex; justify-content: space-between; align-items: center; }
        .dc-top i { font-size: 24px; color: var(--cyan); }
        .dc-status { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; color: var(--text-dim); }
        .dc-status .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); }
        .dc-status .dot.gray { background: #444; box-shadow: none; }
        .dc-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); }
        .toggle-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .toggle-btn:hover { border-color: var(--cyan); background: rgba(0,242,255,0.05); }
    </style>
</body>
</html>
